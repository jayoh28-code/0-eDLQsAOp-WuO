<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Find Elsword!</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@700;900&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#ca424c;
  --dark:#7a1a20;
  --gold:#ffd966;
  --gold2:#ffb300;
  --white:#fff8f0;
  --green:#4caf50;
  --green-dk:#2e7d32;
  --cta:#ff6b00;
  --cta-dk:#a03d00;
}

html,body{
  width:100%;height:100%;overflow:hidden;
  background:#1a0a0c;
  font-family:'Nunito',sans-serif;
  display:flex;justify-content:center;align-items:center;
}

/* 9:16 centered container */
#gameWrapper{
  position:relative;
  width:min(100vw, calc(100vh * 9/16));
  height:min(100vh, calc(100vw * 16/9));
  overflow:hidden;
  background:#ca424c;
}

#gameContainer{
  position:absolute;inset:0;overflow:hidden;cursor:crosshair;
}

canvas{
  position:absolute;top:0;left:0;
  width:100%;height:100%;
  image-rendering:auto;
}

/* ── HUD ── */
#hud{
  position:absolute;top:0;left:0;right:0;
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 16px;
  background:linear-gradient(to bottom,rgba(0,0,0,0.6) 0%,transparent 100%);
  pointer-events:none;z-index:10;
}
#timerDisplay{
  font-family:'Bangers',cursive;
  font-size:clamp(20px,5vw,34px);
  color:var(--gold);
  text-shadow:0 2px 8px rgba(0,0,0,0.8),0 0 20px rgba(255,217,102,0.4);
  letter-spacing:2px;
}
#variantDisplay{
  font-family:'Bangers',cursive;
  font-size:clamp(13px,3vw,18px);
  color:rgba(255,248,240,0.5);
  letter-spacing:1px;
}

/* ── OVERLAYS ── */
.overlay{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  z-index:20;
  opacity:0;pointer-events:none;
  transition:opacity 0.35s ease;
}
.overlay.active{opacity:1;pointer-events:all}

/* ── START SCREEN ── */
#startScreen{
  background:radial-gradient(ellipse at 50% 38%,rgba(202,66,76,0.97) 0%,rgba(70,10,16,0.98) 100%);
}
.screen-title{
  font-family:'Bangers',cursive;
  font-size:clamp(42px,10vw,72px);
  color:var(--gold);
  text-shadow:4px 4px 0px var(--dark),0 0 40px rgba(255,217,102,0.5);
  letter-spacing:4px;text-align:center;line-height:1;
  animation:titlePop 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
}
.screen-subtitle{
  font-size:clamp(12px,2.8vw,17px);color:var(--white);text-align:center;
  margin:12px 24px 0;opacity:0.85;text-shadow:0 1px 4px rgba(0,0,0,0.5);
  line-height:1.5;
}
.character-preview{
  display:flex;gap:14px;margin:20px 0 4px;align-items:flex-end;
}
.preview-item{
  display:flex;flex-direction:column;align-items:center;gap:4px;
}
.preview-img{
  width:72px;height:72px;object-fit:contain;
  filter:drop-shadow(0 4px 8px rgba(0,0,0,0.5));
}
.preview-label{
  font-family:'Bangers',cursive;font-size:12px;letter-spacing:1px;
  color:var(--white);opacity:0.75;
}
.preview-label.target{color:var(--gold);opacity:1;font-size:15px}
.arrow-find{font-size:24px;animation:bounce 0.7s infinite alternate;margin-bottom:2px;display:inline-block}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  font-family:'Bangers',cursive;letter-spacing:2px;border:none;cursor:pointer;
  border-radius:10px;transition:transform 0.12s,box-shadow 0.12s;text-decoration:none;
  user-select:none;
}
.btn:hover{transform:scale(1.06)}
.btn:active{transform:scale(0.96)}
.btn-start{
  font-size:clamp(20px,5vw,30px);padding:13px 48px;
  background:var(--gold);color:var(--dark);
  box-shadow:0 6px 0 #9e7000,0 8px 20px rgba(0,0,0,0.45);
  margin-top:24px;
}
.btn-start:hover{box-shadow:0 8px 0 #9e7000,0 14px 30px rgba(0,0,0,0.4)}

/* ── WIN SCREEN ── */
#successScreen{
  background:radial-gradient(ellipse at 50% 40%,rgba(80,15,20,0.95) 0%,rgba(15,3,5,0.97) 100%);
  gap:0;overflow:hidden;
}
#winContent{
  position:relative;z-index:3;
  display:flex;flex-direction:column;align-items:center;
  width:100%;padding:0 20px;
}

/* Character pop */
#elswordWrap{
  position:relative;
  margin-bottom:2px;
  animation:heroEntrance 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.05s both;
}
#elswordReveal{
  width:clamp(90px,22vw,130px);
  height:clamp(90px,22vw,130px);
  object-fit:contain;
  position:relative;z-index:2;
  filter:drop-shadow(0 0 18px rgba(255,217,102,0.9)) drop-shadow(0 0 40px rgba(255,150,0,0.5));
}
.halo{
  position:absolute;
  border-radius:50%;
  animation:haloExpand 1.5s ease-out infinite;
  border:3px solid rgba(255,217,102,0.6);
}
.halo:nth-child(1){width:100%;height:100%;top:0;left:0;animation-delay:0s}
.halo:nth-child(2){width:140%;height:140%;top:-20%;left:-20%;animation-delay:0.4s}
.halo:nth-child(3){width:180%;height:180%;top:-40%;left:-40%;animation-delay:0.8s}

.success-title{
  font-family:'Bangers',cursive;
  font-size:clamp(44px,11vw,80px);
  color:var(--gold);
  text-shadow:0 0 30px rgba(255,217,102,0.9),4px 4px 0 #5a3000;
  letter-spacing:5px;text-align:center;line-height:1;
  animation:successPop 0.55s cubic-bezier(0.34,1.56,0.64,1) 0.15s both;
  position:relative;z-index:3;
}
.win-stars{
  font-size:clamp(18px,5vw,28px);
  letter-spacing:6px;
  animation:starsAppear 0.5s ease 0.35s both;
  margin:4px 0 6px;
}
.score-grid{
  display:flex;align-items:center;gap:0;
  margin:4px 0 18px;
  animation:fadeUp 0.4s ease 0.45s both;
}
.score-item{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:8px 20px;
}
.score-label{
  font-family:'Bangers',cursive;
  font-size:clamp(11px,2.5vw,15px);
  letter-spacing:2px;
  color:rgba(255,248,240,0.5);
}
.score-value{
  font-family:'Bangers',cursive;
  font-size:clamp(26px,7vw,44px);
  color:var(--gold);
  letter-spacing:2px;
  text-shadow:0 0 20px rgba(255,217,102,0.6);
  line-height:1;
}
.score-divider{
  width:2px;height:44px;
  background:rgba(255,248,240,0.15);
  border-radius:2px;
}

/* CTA — primary action (identical on win + lose) */
.btn-download{
  font-size:clamp(18px,4.5vw,26px);
  padding:12px 38px;
  background:linear-gradient(135deg,#ff6b00,#ff9500);
  color:#fff;
  box-shadow:0 5px 0 #7a3000,0 8px 20px rgba(255,107,0,0.4);
  border-radius:10px;
  width:100%;max-width:340px;text-align:center;
  white-space:nowrap;
  opacity:1;
  animation:ctaPulse 2s ease-in-out 0.5s infinite;
  position:relative;z-index:3;
}
.btn-download:hover{
  transform:scale(1.06);
  box-shadow:0 7px 0 #7a3000,0 14px 30px rgba(255,107,0,0.5);
  animation-play-state:paused;
}
.btn-download:active{transform:scale(0.97)}

/* Play Again — secondary */
.btn-replay{
  font-size:clamp(13px,3.2vw,18px);
  padding:9px 26px;
  background:rgba(255,255,255,0.1);
  color:rgba(255,248,240,0.75);
  border:2px solid rgba(255,248,240,0.25);
  box-shadow:none;
  border-radius:8px;
  margin-top:10px;
  width:100%;max-width:320px;text-align:center;
  backdrop-filter:blur(4px);
  animation:fadeUp 0.4s ease 0.75s both;
  position:relative;z-index:3;
}
.btn-replay:hover{
  background:rgba(255,255,255,0.18);
  color:var(--white);
  border-color:rgba(255,248,240,0.5);
}

/* ── FAIL SCREEN ── */
#failScreen{
  background:radial-gradient(ellipse at 50% 40%,rgba(80,15,20,0.95) 0%,rgba(15,3,5,0.97) 100%);
}
.fail-title{
  font-family:'Bangers',cursive;
  font-size:clamp(42px,10vw,72px);
  color:#ff6b6b;
  text-shadow:3px 3px 0 #7a1a1a;
  letter-spacing:3px;text-align:center;
  animation:shakeFail 0.5s ease both;
}
.fail-sub{
  font-size:clamp(12px,2.8vw,16px);
  color:var(--white);opacity:0.7;
  margin:10px 24px 20px;text-align:center;
}

.btn-fail-replay{
  font-size:clamp(13px,3.2vw,18px);
  padding:9px 26px;
  background:rgba(255,255,255,0.08);
  color:rgba(255,248,240,0.7);
  border:2px solid rgba(255,248,240,0.2);
  border-radius:8px;margin-top:10px;
  width:100%;max-width:340px;text-align:center;
}
.btn-fail-replay:hover{background:rgba(255,255,255,0.15);color:var(--white)}

#burstCanvas{
  position:absolute;inset:0;pointer-events:none;z-index:15;width:100%;height:100%;
}

/* ── KEYFRAMES ── */
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-9px)}}
@keyframes titlePop{from{transform:scale(0.3) rotate(-8deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
@keyframes successPop{from{transform:scale(0.2) rotate(10deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
@keyframes heroEntrance{from{transform:scale(0.05) rotate(-540deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
@keyframes starsAppear{from{opacity:0;letter-spacing:2px}to{opacity:1;letter-spacing:6px}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes shakeFail{0%,100%{transform:translateX(0)}20%{transform:translateX(-12px) rotate(-2deg)}40%{transform:translateX(12px) rotate(2deg)}60%{transform:translateX(-8px)}80%{transform:translateX(8px)}}
@keyframes haloExpand{0%{transform:scale(1);opacity:0.7}100%{transform:scale(2.2);opacity:0}}
@keyframes ctaPulse{
  0%,100%{box-shadow:0 6px 0 #7a2400,0 10px 30px rgba(255,100,0,0.5),0 0 0 0 rgba(255,140,0,0.6)}
  50%{box-shadow:0 6px 0 #7a2400,0 14px 40px rgba(255,100,0,0.7),0 0 0 10px rgba(255,140,0,0)}
}
@keyframes winShimmer{
  0%,100%{filter:drop-shadow(0 0 18px rgba(255,217,102,0.9)) drop-shadow(0 0 40px rgba(255,150,0,0.5))}
  50%{filter:drop-shadow(0 0 28px rgba(255,217,102,1)) drop-shadow(0 0 60px rgba(255,200,0,0.8))}
}
</style>
</head>

    </div>

    <!-- FAIL SCREEN -->
    <div class="overlay" id="failScreen">

      <button class="btn btn-fail-replay" id="retryBtn">&#128260; Try Again</button>

  </div>
</div>

const imgs = {};
let assetsLoaded = 0;

function loadAssets(cb) {
  ['elsword','rena','aisha'].forEach(k => {
    const img = new Image();
    img.src = ASSETS[k];
    img.onload = () => { if(++assetsLoaded === 3) cb(); };
    imgs[k] = img;
  });
}

document.getElementById('prevElsword').src   = ASSETS.elsword;
document.getElementById('prevRena').src      = ASSETS.rena;
document.getElementById('prevAisha').src     = ASSETS.aisha;
document.getElementById('elswordReveal').src = ASSETS.elsword;

// ── Canvas ──
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const burstCanvas = document.getElementById('burstCanvas');
const bCtx   = burstCanvas.getContext('2d');

function resize() {
  canvas.width  = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
  burstCanvas.width  = burstCanvas.offsetWidth;
  burstCanvas.height = burstCanvas.offsetHeight;
}
resize();

const resizeObs = new ResizeObserver(() => {
  resize();
  if(gameState === 'playing' || gameState === 'start') initVariant(currentVariant);
});
resizeObs.observe(canvas);

// ── Constants ──
const HEAD_SIZE     = 94;
const CROWD_COUNT   = 350;
const GAME_DURATION = 6.0;
const ELSWORD_Z     = 0.50;

// ── State ──
let gameState      = 'start';
let currentVariant = 0;
let roundNumber    = 0;
let startTime      = 0;
let animRAF        = null;
let lastTimestamp  = 0;
let paused         = false;
let elapsed        = 0;
let bestTime       = null;

const crowd = [];
let elswordHead = null;

// ── 7 Variants ──
const VARIANTS = [
  { id:0, name:'CLASSIC',  el:{sx:0.52,sy:0.50}, elPath:'lissajous',  elAmp:{ax:180,ay:280}, elFreq:{fx:0.18,fy:0.11}, crowdDriftBias:0,        crowdSpeedMult:1.0 },
  { id:1, name:'CORNER',   el:{sx:0.82,sy:0.18}, elPath:'edge_crawl', elAmp:{ax:60, ay:80},  elFreq:{fx:0.22,fy:0.14}, crowdDriftBias:Math.PI,  crowdSpeedMult:1.2 },
  { id:2, name:'STEALTH',  el:{sx:0.18,sy:0.78}, elPath:'zigzag',     elAmp:{ax:120,ay:60},  elFreq:{fx:0.30,fy:0.08}, crowdDriftBias:0.4,      crowdSpeedMult:0.85},
  { id:3, name:'ORBIT',    el:{sx:0.50,sy:0.68}, elPath:'circle',     elAmp:{ax:200,ay:130}, elFreq:{fx:0.15,fy:0.15}, crowdDriftBias:1.2,      crowdSpeedMult:1.3 },
  { id:4, name:'GHOST',    el:{sx:0.22,sy:0.25}, elPath:'diagonal',   elAmp:{ax:140,ay:200}, elFreq:{fx:0.12,fy:0.20}, crowdDriftBias:0.8,      crowdSpeedMult:1.15},
  { id:5, name:'CHAOS',    el:{sx:0.48,sy:0.48}, elPath:'figure8',    elAmp:{ax:220,ay:120}, elFreq:{fx:0.20,fy:0.40}, crowdDriftBias:0,        crowdSpeedMult:1.5 },
  { id:6, name:'EDGE',     el:{sx:0.88,sy:0.52}, elPath:'bounce',     elAmp:{ax:80, ay:160}, elFreq:{fx:0.25,fy:0.16}, crowdDriftBias:-0.5,     crowdSpeedMult:0.9 },
];

function initVariant(varIdx) {
  const W = canvas.width, H = canvas.height;
  const v = VARIANTS[varIdx];
  crowd.length = 0;
  const types = ['rena','aisha'];
  for(let i=0; i<CROWD_COUNT; i++) {
    const type = types[i%2];
    const margin = HEAD_SIZE*0.5;
    const x = margin + Math.random()*(W-margin*2);
    const y = margin + Math.random()*(H-margin*2);
    const speed = (60+Math.random()*100)*v.crowdSpeedMult;
    const baseAngle = v.crowdDriftBias + (Math.random()-0.5)*Math.PI*(v.crowdDriftBias===0?2:1.2);
    crowd.push({ x, y, vx:Math.cos(baseAngle)*speed, vy:Math.sin(baseAngle)*speed, type, z:Math.random(), size:HEAD_SIZE });
  }
  elswordHead = {
    x:v.el.sx*W, y:v.el.sy*H,
    type:'elsword', z:ELSWORD_Z, size:HEAD_SIZE,
    ox:v.el.sx*W, oy:v.el.sy*H,
    t:0, variant:v,
  };
}

function getElswordPos(el, dt) {
  const W = canvas.width, H = canvas.height;
  const v = el.variant;
  el.t += dt;
  const t = el.t;
  let nx, ny;
  switch(v.elPath) {
    case 'lissajous':  nx = el.ox+Math.sin(t*v.elFreq.fx*Math.PI*2)*v.elAmp.ax; ny = el.oy+Math.sin(t*v.elFreq.fy*Math.PI*2+0.3)*v.elAmp.ay; break;
    case 'edge_crawl': nx = el.ox+Math.cos(t*v.elFreq.fx*Math.PI*2)*v.elAmp.ax; ny = el.oy+Math.abs(Math.sin(t*v.elFreq.fy*Math.PI*2))*v.elAmp.ay; break;
    case 'zigzag':     nx = el.ox+Math.sin(t*v.elFreq.fx*Math.PI*2)*v.elAmp.ax; ny = el.oy+((t*30)%v.elAmp.ay)-v.elAmp.ay*0.5; break;
    case 'circle':     nx = el.ox+Math.cos(t*v.elFreq.fx*Math.PI*2)*v.elAmp.ax; ny = el.oy+Math.sin(t*v.elFreq.fy*Math.PI*2)*v.elAmp.ay; break;
    case 'diagonal':   nx = el.ox+Math.sin(t*v.elFreq.fx*Math.PI*2)*v.elAmp.ax; ny = el.oy+Math.cos(t*v.elFreq.fy*Math.PI*2)*v.elAmp.ay; break;
    case 'figure8':    nx = el.ox+Math.sin(t*v.elFreq.fx*Math.PI*2)*v.elAmp.ax; ny = el.oy+Math.sin(t*v.elFreq.fy*Math.PI*2)*v.elAmp.ay; break;
    case 'bounce':     nx = el.ox+Math.cos(t*v.elFreq.fx*Math.PI*2)*v.elAmp.ax; ny = el.oy+Math.abs(Math.sin(t*v.elFreq.fy*Math.PI*2))*v.elAmp.ay*(Math.sin(t*0.7)>0?1:-1); break;
    default:           nx = el.ox; ny = el.oy;
  }
  const hs = el.size*0.5;
  el.x = Math.max(hs, Math.min(W-hs, nx));
  el.y = Math.max(hs, Math.min(H-hs, ny));
}

function updateCrowd(dt) {
  const W = canvas.width, H = canvas.height;
  const hs = HEAD_SIZE*0.5;
  for(const h of crowd) {
    h.x += h.vx*dt;
    h.y += h.vy*dt;
    if(h.x<-hs||h.x>W+hs||h.y<-hs||h.y>H+hs) {
      const edge = Math.floor(Math.random()*4);
      if(edge===0)      { h.x=-hs;   h.y=Math.random()*H; }
      else if(edge===1) { h.x=W+hs;  h.y=Math.random()*H; }
      else if(edge===2) { h.x=Math.random()*W; h.y=-hs; }
      else              { h.x=Math.random()*W; h.y=H+hs; }
    }
  }
}

function draw() {
  const W = canvas.width, H = canvas.height;
  ctx.fillStyle = '#ca424c';
  ctx.fillRect(0,0,W,H);
  const sorted = crowd.slice().sort((a,b)=>a.z-b.z);
  let insertIdx = sorted.findIndex(h=>h.z>ELSWORD_Z);
  if(insertIdx===-1) insertIdx=sorted.length;
  for(let i=0;i<insertIdx;i++) drawHead(sorted[i]);
  drawHead(elswordHead);
  for(let i=insertIdx;i<sorted.length;i++) drawHead(sorted[i]);
}

function drawHead(h) {
  const hs = h.size*0.5;
  ctx.drawImage(imgs[h.type], h.x-hs, h.y-hs, h.size, h.size);
}

// ── Game loop ──
function gameLoop(ts) {
  if(gameState !== 'playing') return;
  const dt = Math.min((ts-lastTimestamp)/1000, 0.05);
  lastTimestamp = ts;
  if(!paused) {
    elapsed += dt;
    updateCrowd(dt);
    getElswordPos(elswordHead, dt);
  }
  draw();
  const remaining = Math.max(0, GAME_DURATION-elapsed);
  const td = document.getElementById('timerDisplay');
  td.textContent = '\u23F1 '+remaining.toFixed(1)+'s';
  td.style.color = remaining<2.5 ? '#ff6b6b' : 'var(--gold)';
  if(remaining<=0 && !paused) { triggerFail(); return; }
  animRAF = requestAnimationFrame(gameLoop);
}

function startGame(varIdx) {
  gameState = 'playing';
  paused = false;
  elapsed = 0;
  currentVariant = varIdx;
  roundNumber++;
  document.getElementById('variantDisplay').textContent = 'ROUND '+roundNumber;
  document.getElementById('timerDisplay').style.color = 'var(--gold)';
  hideAllOverlays();
  initVariant(varIdx);
  particles.length = 0;
  bCtx.clearRect(0,0,burstCanvas.width,burstCanvas.height);
  startTime = performance.now();
  lastTimestamp = performance.now();
  if(animRAF) cancelAnimationFrame(animRAF);
  animRAF = requestAnimationFrame(gameLoop);
}

// ── Click detection ──
function getEventPos(e) {
  const r = canvas.getBoundingClientRect();
  if(e.touches) return {x:e.touches[0].clientX-r.left, y:e.touches[0].clientY-r.top};
  return {x:e.clientX-r.left, y:e.clientY-r.top};
}

function onCanvasClick(e) {
  if(gameState !== 'playing' || paused) return;
  const pos = getEventPos(e);
  const scaleX = canvas.width/canvas.offsetWidth;
  const scaleY = canvas.height/canvas.offsetHeight;
  const cx = pos.x*scaleX;
  const cy = pos.y*scaleY;
  const hs = elswordHead.size*0.55;
  if(Math.abs(cx-elswordHead.x)<hs && Math.abs(cy-elswordHead.y)<hs) {
    triggerSuccess();
  }
}

canvas.addEventListener('click', onCanvasClick);
canvas.addEventListener('touchstart', e=>{ e.preventDefault(); onCanvasClick(e); }, {passive:false});

// ── Success — IMMEDIATELY pause all movement ──
function triggerSuccess() {
  paused = true;
  gameState = 'success';
  if(animRAF) { cancelAnimationFrame(animRAF); animRAF = null; }

  // Record time
  const foundSec = parseFloat(((performance.now()-startTime)/1000).toFixed(1));
  if(bestTime === null || foundSec < bestTime) bestTime = foundSec;
  document.getElementById('foundTime').textContent = foundSec.toFixed(1)+'s';
  document.getElementById('bestTime').textContent  = bestTime.toFixed(1)+'s';

  // Zoom-forward + wiggle animation on canvas, then show win screen
  const celebDuration = 900; // ms total before overlay
  const celebStart    = performance.now();
  const startX = elswordHead.x, startY = elswordHead.y;
  const baseSize = elswordHead.size;

  function celebLoop(ts) {
    const t  = Math.min((ts - celebStart) / celebDuration, 1);
    // Scale: grows from 1x to 2.4x then slightly eases back
    const scaleVal = 1 + 1.4 * Math.sin(t * Math.PI * 0.9);
    // Wiggle: rapid oscillation that fades out
    const wiggle = Math.sin(t * Math.PI * 10) * 18 * (1 - t);
    elswordHead.size = baseSize * scaleVal;
    elswordHead.x = startX + wiggle;

    // Draw frozen crowd, then Elsword on top of everything
    const W = canvas.width, H = canvas.height;
    ctx.fillStyle = '#ca424c';
    ctx.fillRect(0,0,W,H);
    const sorted = crowd.slice().sort((a,b)=>a.z-b.z);
    for(let i=0;i<sorted.length;i++) drawHead(sorted[i]);
    // Draw Elsword last (foreground) with glow
    const hs = elswordHead.size * 0.5;
    ctx.save();
    ctx.shadowColor  = 'rgba(255,217,102,0.9)';
    ctx.shadowBlur   = 30 + 20 * Math.sin(t * Math.PI * 4);
    ctx.drawImage(imgs.elsword, elswordHead.x-hs, elswordHead.y-hs, elswordHead.size, elswordHead.size);
    ctx.restore();

    if(t < 1) {
      requestAnimationFrame(celebLoop);
    } else {
      // Burst then show overlay
      const scaleX = canvas.offsetWidth/canvas.width;
      const scaleY = canvas.offsetHeight/canvas.height;
      launchBurst(elswordHead.x*scaleX, elswordHead.y*scaleY);
      setTimeout(()=>{ showOverlay('successScreen'); }, 400);
    }
  }
  requestAnimationFrame(celebLoop);
}

function triggerFail() {
  paused = true;
  gameState = 'fail';
  if(animRAF) { cancelAnimationFrame(animRAF); animRAF = null; }
  showOverlay('failScreen');
}

// ── Burst ──
const particles = [];

function launchBurst(x, y) {
  const colors = ['#ffd966','#ff9500','#ffffff','#ffec99','#ff6b00','#ffe066','#ffb300'];
  for(let i=0;i<80;i++) {
    const angle = Math.random()*Math.PI*2;
    const speed = 80+Math.random()*320;
    particles.push({
      x, y,
      vx:Math.cos(angle)*speed,
      vy:Math.sin(angle)*speed,
      life:1,
      decay:0.018+Math.random()*0.026,
      size:5+Math.random()*13,
      color:colors[Math.floor(Math.random()*colors.length)],
      shape:Math.random()>0.45?'circle':'star',
      rot:Math.random()*Math.PI*2,
      rotV:(Math.random()-0.5)*8,
    });
  }
  lastBurstTS = performance.now();
  requestAnimationFrame(burstLoop);
}

let lastBurstTS = 0;
function burstLoop(ts) {
  const dt = Math.min((ts-lastBurstTS)/1000, 0.05);
  lastBurstTS = ts;
  bCtx.clearRect(0,0,burstCanvas.width,burstCanvas.height);
  let alive = false;
  for(const p of particles) {
    if(p.life<=0) continue;
    alive = true;
    p.x  += p.vx*dt;
    p.y  += p.vy*dt;
    p.vy += 240*dt;
    p.rot+= p.rotV*dt;
    p.life -= p.decay;
    bCtx.save();
    bCtx.globalAlpha = Math.max(0,p.life);
    bCtx.fillStyle = p.color;
    bCtx.translate(p.x, p.y);
    bCtx.rotate(p.rot);
    if(p.shape==='star') drawStar(bCtx,0,0,5,p.size,p.size*0.4);
    else { bCtx.beginPath(); bCtx.arc(0,0,p.size/2,0,Math.PI*2); bCtx.fill(); }
    bCtx.restore();
  }
  if(alive) requestAnimationFrame(burstLoop);
  else bCtx.clearRect(0,0,burstCanvas.width,burstCanvas.height);
}

function drawStar(c,cx,cy,spikes,outerR,innerR) {
  let rot=(Math.PI/2)*3, step=Math.PI/spikes;
  c.beginPath(); c.moveTo(cx,cy-outerR);
  for(let i=0;i<spikes;i++) {
    c.lineTo(cx+Math.cos(rot)*outerR,cy+Math.sin(rot)*outerR); rot+=step;
    c.lineTo(cx+Math.cos(rot)*innerR,cy+Math.sin(rot)*innerR); rot+=step;
  }
  c.lineTo(cx,cy-outerR); c.closePath(); c.fill();
}

function hideAllOverlays() {
  ['startScreen','successScreen','failScreen'].forEach(id=>{
    document.getElementById(id).classList.remove('active');
  });
}
function showOverlay(id) {
  document.getElementById(id).classList.add('active');
}

// ── Buttons ──
document.getElementById('startBtn').addEventListener('click',()=>{ startGame(Math.floor(Math.random()*VARIANTS.length)); });
document.getElementById('replayBtn').addEventListener('click',()=>{ startGame(Math.floor(Math.random()*VARIANTS.length)); });
document.getElementById('retryBtn').addEventListener('click',()=>{ startGame(Math.floor(Math.random()*VARIANTS.length)); });

// ── Boot ──
loadAssets(()=>{
  initVariant(0);
  function idleLoop(ts) {
    if(gameState !== 'start') return;
    const dt = Math.min((ts-lastTimestamp)/1000, 0.05);
    lastTimestamp = ts;
    updateCrowd(dt);
    getElswordPos(elswordHead, dt);
    draw();
    requestAnimationFrame(idleLoop);
  }
  lastTimestamp = performance.now();
  requestAnimationFrame(idleLoop);
});
</script>
